name: Archive Daily AI News

on:
  workflow_dispatch:
    inputs:
      force:
        description: "强制重新生成当天归档（覆盖已有快照与解读、重新消耗 GLM）"
        type: boolean
        default: false
  schedule:
    # 每天 06:00 CST（UTC+8）= 前一天 22:00 UTC
    - cron: "0 22 * * *"

concurrency:
  group: archive-ai-news-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  archive:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run archive script
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: |
          FORCE=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            FORCE="--force"
            echo "手动触发并勾选 force：强制重新生成当天归档"
          fi
          python scripts/archive_news.py --data-dir data --archive-dir archive $FORCE

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          DATE=$(python -c "from datetime import datetime,timezone,timedelta; print(datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d'))")
          git commit -m "chore: ai morning brief ${DATE}"
          # 生成期间远端可能被其它提交推进（如另一次运行），导致 JSON 冲突。
          # 归档文件由本脚本独占生成，冲突时以本地新生成版本为准（-X theirs）。重试至多 5 次。
          for i in 1 2 3 4 5; do
            git fetch origin master
            if git rebase -X theirs origin/master; then
              if git push origin HEAD:master; then
                echo "pushed on attempt $i"
                exit 0
              fi
            else
              git rebase --abort || true
            fi
            echo "push/rebase 冲突，重试 $i ..."
            sleep $((RANDOM % 5 + 3))
          done
          echo "push failed after 5 retries"
          exit 1
