<!doctype html>
<html lang="zh-CN">
<head>

  />
  <link rel="canonical" href="https://learnprompt.github.io/ai-news-radar/" />
  <meta property="og:title" content="AI News Radar｜24 小时 AI 更新雷达" />
  <meta property="og:description" content="自动整理过去 24 小时值得看的 AI、模型和开发者工具更新；伯乐Skill（Scout Skill）帮你从一堆信源里选出千里马。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://learnprompt.github.io/ai-news-radar/" />
  <meta property="og:site_name" content="AI News Radar" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="AI News Radar｜24 小时 AI 更新雷达" />
  <meta name="twitter:description" content="自动整理过去 24 小时值得看的 AI、模型和开发者工具更新；伯乐Skill（Scout Skill）帮你从一堆信源里选出千里马。" />
  <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./assets/styles.css?v=bole-event-merge-0525" />
  <style>
    /* ── AI 晨报入口链接 ── */
    .archive-link {
      display: inline-block;
      margin-left: 1rem;
      font-size: 0.8125rem;
      color: var(--text-secondary, #888);
      text-decoration: none;
      padding: 0.2rem 0.6rem;
      border: 1px solid var(--border, #e0e0e0);
      border-radius: 14px;
      transition: color 0.15s, border-color 0.15s;
      vertical-align: middle;
    }
    .archive-link:hover { color: var(--text, #222); border-color: var(--text-secondary, #888); }

    /* ── 晨报要点卡片 ── */
    .daily-brief {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1rem;
    }
    .daily-brief-card {
      background: linear-gradient(135deg, #f0f7ff 0%, #fafafa 100%);
      border: 1px solid #c8dff7;
      border-radius: 12px;
      padding: 1.1rem 1.4rem 1.2rem;
      margin-bottom: 0.5rem;
    }
    .daily-brief-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.65rem;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .daily-brief-left { display: flex; align-items: center; gap: 0.5rem; }
    .daily-brief-badge {
      font-size: 0.75rem;
      font-weight: 600;
      background: #1976d2;
      color: #fff;
      padding: 0.15rem 0.55rem;
      border-radius: 10px;
      letter-spacing: 0.03em;
    }
    .daily-brief-date { font-size: 0.8125rem; color: #888; }
    .daily-brief-more {
      font-size: 0.8rem;
      color: #1976d2;
      text-decoration: none;
      opacity: 0.8;
    }
    .daily-brief-more:hover { opacity: 1; text-decoration: underline; }
    .daily-brief-body {
      font-size: 0.9375rem;
      line-height: 1.75;
      color: var(--text, #222);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div class="hero-main">
        <div class="hero-headline">
          <img class="hero-logo" src="./assets/logo.svg" alt="AI News Radar Logo" />
          <div>
            <p class="hero-tag">AI NEWS RADAR</p>
            <h1>24 小时 AI 更新雷达</h1>
          </div>
        </div>
        <p class="hero-sub">
          过去 24 小时值得看的 AI/科技更新；伯乐精选按时间轴和评分挑出重点信号。
        </p>
      </div>
      <div class="hero-meta">
        <span class="updated-label">更新时间</span>
        <span class="updated" id="updatedAt">加载中...</span>
        <a class="archive-link" href="./archive.html">📰 AI 晨报</a>
      </div>
      <section class="stats" id="stats"></section>
      <section class="coverage-strip" id="coverageStrip" aria-label="Source coverage status"></section>
    </header>

    <!-- 晨报要点 -->
    <section class="daily-brief" id="dailyBrief" style="display:none">
      <div class="daily-brief-card">
        <div class="daily-brief-head">
          <div class="daily-brief-left">
            <span class="daily-brief-badge">✦ 晨报要点</span>
            <span class="daily-brief-date" id="dailyBriefDate"></span>
          </div>
          <a class="daily-brief-more" href="./archive.html">查看往期晨报 →</a>
        </div>
        <div class="daily-brief-body" id="dailyBriefText"></div>
      </div>
    </section>

    <section class="primary-controls">
      <input id="searchInput" type="search" placeholder="搜索 AI 信号 / 来源" />
      <div class="mode-hint" id="modeHint">AI强相关</div>
    </section>

    <details class="advanced-panel">
      <summary>
        <span>高级筛选与源状态</span>
        <span class="advanced-summary" id="advancedSummary">加载中...</span>
      </summary>
      <div class="advanced-content">
        <div class="advanced-controls">
          <label class="field">
            <span>站点</span>
            <select id="siteSelect">
              <option value="">全部站点</option>
            </select>
          </label>
          <div class="field">
            <span>视图</span>
            <div class="mode-switch">
              <button id="modeAiBtn" class="mode-btn active" type="button">AI强相关</button>
              <button id="modeAllBtn" class="mode-btn" type="button">全量</button>
            </div>
          </div>
          <label id="allDedupeWrap" class="all-dedupe" for="allDedupeToggle">
            <input id="allDedupeToggle" type="checkbox" checked />
            <span class="all-dedupe-dot"></span>
            <span id="allDedupeLabel">去重开</span>
          </label>
        </div>
        <div class="source-health" id="sourceHealth">源状态加载中...</div>
        <section class="site-pills" id="sitePills"></section>
      </div>
    </details>

    <section class="bole-picks-wrap" aria-label="伯乐精选">
      <div class="bole-picks-head">
        <div>
          <p class="section-eyebrow">BOLE PICKS</p>
          <h2>伯乐精选</h2>
        </div>
        <span id="bolePicksMeta">按评分排序</span>
      </div>
      <div class="bole-picks-sub">从 24 小时信号池里挑出更值得先看的更新，展示发布时间线、评分和命中理由。</div>
      <div id="bolePicksList" class="bole-board"></div>
    </section>

    <section class="waytoagi-wrap">
      <div class="waytoagi-head">
        <h2>WaytoAGI 更新日志</h2>
        <div class="waytoagi-tools">
          <div class="waytoagi-switch">
            <button id="waytoagiTodayBtn" class="waytoagi-btn active" type="button">最近更新日</button>
            <button id="waytoagi7dBtn" class="waytoagi-btn" type="button">近7日</button>
          </div>
          <span id="waytoagiUpdatedAt">加载中...</span>
        </div>
      </div>
      <div id="waytoagiMeta" class="waytoagi-meta"></div>
      <div id="waytoagiList" class="waytoagi-list"></div>
    </section>

    <section class="list-wrap">
      <div class="list-head">
        <h2 id="listTitle">AI 信号流</h2>
        <span id="resultCount">0 条</span>
      </div>
      <div id="newsList" class="news-list"></div>
    </section>
  </main>

  <template id="itemTpl">
    <article class="news-card">
      <div class="meta-row">
        <span class="site"></span>
        <span class="category"></span>
        <span class="source"></span>
        <time class="time"></time>
      </div>
      <a class="title" target="_blank" rel="noopener noreferrer"></a>
    </article>
  </template>

  <!-- 晨报要点：读取最新一期已生成的摘要文件，不调用任何 API -->
  <script>
  (function () {
    function show(date, data) {
      document.getElementById('dailyBriefDate').textContent =
        date + ' · 08:00 自动生成 · 覆盖近 24 小时 · by ' + (data.model || 'GLM');
      document.getElementById('dailyBriefText').textContent = data.summary;
      document.getElementById('dailyBrief').style.display = '';
    }
    function loadSummary(date) {
      return fetch('./archive/' + date + '-summary.json?t=' + Date.now())
        .then(function (r) { return r.ok ? r.json() : null; });
    }
    // 优先用归档索引里“最新一期有摘要”的日期，避免当天 08:00 前文件缺失导致卡片消失。
    fetch('./archive/index.json?t=' + Date.now())
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (idx) {
        var dates = (idx && idx.dates) || [];
        var entry = dates.find(function (d) { return d.has_summary; }) || dates[0];
        if (!entry) return;
        return loadSummary(entry.date).then(function (data) {
          if (data && data.summary) show(entry.date, data);
        });
      })
      .catch(function () {});
  })();
  </script>

  <script src="./assets/app.js?v=bole-event-merge-0525" defer></script>
</body>
</html>
